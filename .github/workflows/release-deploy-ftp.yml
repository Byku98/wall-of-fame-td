name: Deploy to FTP
on:
  push:
    branches:
      - "release"
  pull_request:
    types:
      - closed
    branches:
      - "release"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true || github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build --if-present

      # ==========================================
      # 1️⃣ Generowanie pliku .env
      # ==========================================
      - name: Generate .env file
        run: |
          cat > .env <<'EOF'
          # ==========================================
          # DATABASE CONFIGURATION
          # ==========================================
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          # ==========================================
          # EXTERNAL SERVICES
          # ==========================================
          # Discord Webhook URL for notifications
          LAP_DISCORD_WEBHOOK_URL=${{ secrets.LAP_DISCORD_WEBHOOK_URL }}
          RIDER_DISCORD_WEBHOOK_URL=${{ secrets.RIDER_DISCORD_WEBHOOK_URL }}
          EOF

      # ==========================================
      # 2️⃣ Przygotowanie paczki do wysyłki
      # ==========================================
      - name: Prepare deploy content
        run: |
          mkdir deploy
          cp -r dist deploy/
          cp -r public deploy/
          cp package.json deploy/
          cp .env deploy/

      # ==========================================
      # 3️⃣ Wysyłka na FTP (najpierw czyszczenie, potem upload)
      # ==========================================
      - name: Clean specific files/folders via lftp
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" "${{ secrets.FTP_HOST }}" <<EOF
          set ssl:verify-certificate no
          set cmd:fail-exit no
          rmdir --ignore-fail-on-non-empty dist
          rmdir --ignore-fail-on-non-empty public
          rm package.json
          bye
          EOF

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy/
          server-dir: ./
